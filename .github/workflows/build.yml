name: Build Custom OS Images
on:
  schedule:
    - cron: '0 0 * * 0' # weekly build
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'justfile'
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipes/gaming-desktop.yml
          - recipes/server.yml
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Verify Key Decryption
        env:
          COSIGN_PASSWORD: "password"
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
        run: |
          echo "$SIGNING_SECRET" > test_cosign.key
          cosign public-key --key test_cosign.key
          rm test_cosign.key

      - name: Build and Push Image
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
        env:
          COSIGN_PASSWORD: "password"
