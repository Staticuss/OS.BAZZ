name: Generate Cosign Keys
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@main

      - name: Generate and Verify Keys
        run: |
          # Generate keys with exact password via env var
          COSIGN_PASSWORD="password" cosign generate-key-pair
          
          # Immediately verify decryption works
          echo "=== Verifying key decryption ==="
          COSIGN_PASSWORD="password" cosign public-key --key cosign.key
          echo "=== Verification PASSED ==="
          
          # Show public key for reference
          echo "=== PUBLIC KEY ==="
          cat cosign.pub

      - name: Upload Keys as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cosign-keys
          path: |
            cosign.key
            cosign.pub
          retention-days: 1
